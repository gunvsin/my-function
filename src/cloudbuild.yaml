- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'stripe-fetch-charges'
      - '--gen2'
      - '--runtime=python311'
      - '--memory=512Mi'
      - '--region=australia-southeast1'
      - '--source=.'
      - '--entry-point=fetch_stripe_charges'
      - '--trigger-http'
      - '--set-env-vars'
      - 'GCP_PROJECT=$PROJECT_ID'
